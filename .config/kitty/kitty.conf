include colorscheme.conf

# Fonts
font_size 10
force_ltr no
disable_ligatures never

font_family      monospace
bold_font        auto
italic_font      auto
bold_italic_font auto

font_family      CaskaydiaCove Nerd Font Propo
bold_font        CaskaydiaCove Nerd Font Propo Bold
italic_font      CaskaydiaCove Nerd Font Propo Italic
bold_italic_font CaskaydiaCove Nerd Font Propo Bold Italic

# URLs
detect_urls yes
url_color #4586c4
url_style straight
underline_hyperlinks hover
open_url_with default
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh

# Window layout
remember_window_size  no
initial_window_width  1000
initial_window_height 600

window_padding_width 4
active_border_color #4586c4
inactive_border_color #34465c

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_bar_align left
tab_bar_min_tabs 2

active_tab_foreground   #c2ddff
active_tab_background   #4586c4
active_tab_font_style   bold-italic
inactive_tab_foreground #bdd3ef
inactive_tab_background #34465c
inactive_tab_font_style normal

# Misc.
shell fish
shell_integration enabled
update_check_interval 0
mouse_hide_wait 3.0
sync_to_monitor yes
